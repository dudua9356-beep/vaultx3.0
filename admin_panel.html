{% extends "base.html" %}

{% block content %}

<h2>Painel Admin</h2>

<table>

<tr>
<th>User ID</th>
<th>Nome</th>
<th>Saldo</th>
</tr>

{% for u in users %}

<tr>
<td>{{u.user_id}}</td>
<td>{{u.username}}</td>
<td>{{u.balance}}</td>
</tr>

{% endfor %}

</table>

<h3>Adicionar saldo</h3>

<form method="POST">

<input name="user_id" placeholder="User ID">

<input name="amount" placeholder="Valor">

<button>Adicionar</button>

</form>

{% endblock %}
